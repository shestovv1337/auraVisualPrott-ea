    <style>

        .someInput {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 12px;
            color: #fff;
            margin-bottom: 15px;
            font-size: 14px;
            transition: border-color .3s;
        }

        .someInput:focus {
            border-color: var(--accent-color);
            outline: none;
        }
        .swal2-popup {
            background: rgba(255, 255, 255, .02);
            border: 1px solid rgba(255, 255, 255, .05);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
            backdrop-filter: blur(7px);
        }

        .swal2-title {
            color: #fff !important;
        }

        .swal2-html-container {
            color: #ddd !important;
        }

        .swal2-confirm {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%) !important;
            border: none !important;
        }

        .swal2-cancel {
            background: #333 !important;
            color: #fff !important;
            border: none !important;
        }

        .swal2-confirm {
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-color) 100%) !important;
            border: none !important;
            border-radius: 20px !important;
            padding: 12px 24px !important;
            font-weight: 600 !important;
            color: white !important;
            transition: all 0.3s ease !important;

        }

        .swal2-confirm:hover {
            transform: translateY(-1px) !important;
        }

        .swal2-confirm:active {
            transform: translateY(0) !important;
        }

        .swal2-cancel {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px !important;
            padding: 12px 24px !important;
            font-weight: 500 !important;
            color: rgba(255, 255, 255, 0.8) !important;
            transition: all 0.3s ease !important;
        }

        .swal2-cancel:hover {
            background: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        .swal2-actions {
            max-width: 100%;
            display: flex !important;
            gap: 10px !important;
            margin: 0 !important;
            padding: 0 28px !important;
        }

        .swal2-confirm, .swal2-cancel {
            flex: 1 1 0 !important;
            min-width: 0 !important;
            margin: 0 !important;
            padding: 12px !important;
        }

        @media (max-width: 576px) {
            .swal2-actions {
                flex-direction: column !important;
            }
            .swal2-confirm, .swal2-cancel {
                width: 100% !important;
            }

            .swal2-popup {
                padding: 20px 0px;
            }
        }
        .swal2-validation-message {
            background-color: transparent !important;
            color: white;
            font-size: 1.1em;
            margin-bottom: 20px;

        }
        @keyframes customZoomOut {
            from {
                transform: scale(1.1);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .custom-aos-zoom {
            animation: customZoomOut 0.3s ease-out;
        }


        @keyframes customZoomIn {
            from {
                transform: scale(1);
                opacity: 1;
            }
            to {
                transform: scale(1.1);
                opacity: 0;
            }
        }

        .custom-aos-zoom-in {
            animation: customZoomIn 0.3s ease-out;
        }


    </style>

    <style>
        .avatar-upload {
            position: absolute;
            bottom: -40px;
            left: 24px;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            cursor: pointer;
            z-index: 3;
        }

        .avatar-edit {
            position: absolute;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        .avatar-edit input {
            display: none;
        }

        .avatar-edit label {
            display: inline-flex;
            width: 34px;
            height: 34px;
            margin-bottom: 0;
            border-radius: 50%;
            background: var(--accent-color);
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .avatar-edit label:hover {
            background: darken(var(--accent-color), 10%);
            transform: scale(1.1);
        }

        .avatar-edit label i {
            color: #fff;
            font-size: 16px;
        }

        .avatar-preview {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .avatar-preview:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-progress {
            width: 100%;
            margin-top: 10px;
            display: none;
        }

        .upload-status {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            color: var(--accent-color);
            display: none;
        }
    </style>

<script>
    document.getElementById('avatarUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const validTypes = ['image/jpeg', 'image/png', 'image/jpg'];
        if (!validTypes.includes(file.type)) {
            Swal.fire('Ошибка', 'Пожалуйста, выберите изображение в формате JPEG или PNG', 'error');
            return;
        }

        if (file.size > 2 * 1024 * 1024) {
            Swal.fire('Ошибка', 'Размер изображения не должен превышать 2MB', 'error');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('avatarPreview').src = e.target.result;

        };
        reader.readAsDataURL(file);

        uploadAvatar(file);
    });

    function uploadAvatar(file) {
        const formData = new FormData();
        formData.append('file', file);
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/uploadAvatar', true);
        xhr.onload = function() {
            if (xhr.status === 200) {
                const baseUrl = window.location.origin;
                  const relativePath = xhr.responseText;
                  let avatarUrl = baseUrl + relativePath;
                  if (avatarUrl.endsWith('.png')) {
                     avatarUrl = avatarUrl.slice(0, -4);
                  }
                  avatarUrl = avatarUrl.replace(/avatars/g, 'avatar');
                document.querySelector('.profile-background').style.backgroundImage = `url('${avatarUrl}')`;
            }
        }
        xhr.send(formData);
    }
</script>

<script>

    function showRamDialog(dataram) {
        Swal.fire({
            title: 'Установить RAM',
            html:
                '<input type="number" id="ram-input" class="someInput" placeholder="Введите RAM (в МБ)" min="512" max="32768" step="64"  th:value="${ram}">',
            showCancelButton: true,
            confirmButtonText: 'Сохранить',
            cancelButtonText: 'Отмена',
            width: '700px',
            showClass: {
                popup: 'custom-aos-zoom'
            },
            hideClass: {
                popup: 'custom-aos-zoom-in'
            },
            didOpen: () => {
                const field = document.getElementById('ram-input');
                field.value = dataram;
            },
            preConfirm: () => {
                const ramValue = parseInt(document.getElementById('ram-input').value, 10);
                if (!ramValue || ramValue < 512) {
                    Swal.showValidationMessage('Минимум 512МБ');
                }
                if (!ramValue || ramValue > 32000) {
                    Swal.showValidationMessage('Максимум 32000МБ');
                }
                return ramValue;
            }
        }).then((result) => {
            if (result.isConfirmed) {
                fetch('/setMemory', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `value=${result.value}`
                })
                    .then(response => response.text())
                    .then(data => console.log(data))
                    .catch(error => console.error('Error:', error));

                Swal.fire({
                    title: 'Успешно!',
                    text: `RAM установлен: ${result.value} МБ`,
                    icon: 'success',
                    width: '600px'
                });
            }
        });
    }


    document.getElementById('open-ram-modal').addEventListener('click', function () {



        const hwidField = document.getElementById('transferHWID');

        fetch('/getRam?hwid=' + hwidField.value, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
        })
            .then(response => response.text())
            .then(data => {
                showRamDialog(data);
            })
            .catch(error => console.error('Error:', error));
    });




    document.getElementById('open-password-modal').addEventListener('click', function () {
        Swal.fire({
            title: 'Сменить пароль',
            html:
                '<input type="password" id="old-password" class="someInput" placeholder="Старый пароль">' +
                '<input type="password" id="new-password" class="someInput" placeholder="Новый пароль">' +
                '<input type="password" id="new-password-repeat" class="someInput" placeholder="Повторите новый пароль">',
            focusConfirm: false,
            showCancelButton: true,
            width: '700px',
            showClass: {
                popup: 'custom-aos-zoom'
            },
            hideClass: {
                popup: 'custom-aos-zoom-in'
            },
            confirmButtonText: 'Сменить',
            cancelButtonText: 'Отмена',
            preConfirm: () => {
                const oldPassword = Swal.getPopup().querySelector('#old-password').value;
                const newPassword = Swal.getPopup().querySelector('#new-password').value;
                const newPasswordRepeat = Swal.getPopup().querySelector('#new-password-repeat').value;
                if (!oldPassword || !newPassword) {
                    Swal.showValidationMessage(`Пожалуйста, введите оба поля`);
                }
                return { oldPassword, newPassword, newPasswordRepeat};
            }
        }).then((result) => {
            if (result.isConfirmed) {
                const { oldPassword, newPassword, newPasswordRepeat} = result.value;

                $.ajax({
                    type: "POST",
                    url: "change_password",
                    data: {
                        old_password: oldPassword,
                        new_password: newPassword,
                        reapeat_password: newPasswordRepeat
                    },
                    success: function (response) {
                        if (response !== "OK") {
                            Swal.fire({
                                title: 'Ошибка!',
                                text: response,
                                icon: 'error',
                                width: '700px'
                            });
                        } else {
                            Swal.fire({
                                title: 'Успешно!',
                                text: 'Пароль успешно обновлён!',
                                icon: 'success',
                                width: '700px'
                            });
                        }
                    },
                    error: function () {
                        Swal.fire({
                            title: 'Ошибка!',
                            text: 'Произошла ошибка при отправке запроса.',
                            icon: 'error',
                            width: '700px'
                        });
                    }
                });

            }
        });
    });

    document.getElementById('open-key-modal').addEventListener('click', function () {
        Swal.fire({
            title: 'Активация ключа',
            html:
                '<input type="text" id="key-input" class="someInput" placeholder="XXXX-XXXX-XXXX">',
            showCancelButton: true,
            confirmButtonText: 'Активировать',
            cancelButtonText: 'Отмена',
            width: '700px',
            showClass: {
                popup: 'custom-aos-zoom'
            },
            hideClass: {
                popup: 'custom-aos-zoom-in'
            },
            preConfirm: () => {
                const key = document.getElementById('key-input').value.trim();
                if (!key) {
                    Swal.showValidationMessage('Введите ключ!');
                }
                return key;
            }
        }).then((result) => {
            if (result.isConfirmed) {
                const key = result.value;

                $.ajax({
                    type: "POST",
                    url: "/activate",
                    data: { key: key },
                    success: function(response) {
                        $("#activate_resoult").html(response);
                        Swal.fire({
                            title: response.includes('Ключ активирован') ? 'Готово!' : 'Ошибка',
                            text: response,
                            icon: response.includes('Ключ активирован') ? 'success' : 'error',
                            width: '600px'
                        });
                    },
                    error: function(xhr, status, error) {
                        Swal.fire('Ошибка!', 'Не удалось активировать ключ', 'error');
                    }
                });

            }
        });
    });
</script>
