<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title th:text="${@appConfig.getClientName()} + ' » Вход'"></title>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="css/main.css" rel="stylesheet">
    <link href="css/auth.css" rel="stylesheet">
    <link href="vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="vendor/aos/aos.css" rel="stylesheet">
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="icon" type="image/x-icon" th:href="@{/img/logo.png}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        $(document).ready(function(){
            $("#authForm").submit(function(event){
                event.preventDefault();
                $.ajax({
                    type: "POST",
                    url: "api/login",
                    data: $(this).serialize(),
                    success: function(response){
                        if (response !== "OK") {
                            showNotification(response, 'error');
                        }else {
                            showNotification('Успешная авторизация.', 'success');
                            setTimeout(() => {
                            window.location.href = "/cabinet";
                            }, 2100);
                        }
                    }
                });
            });
        });
    </script>
    <style>

        .custom-swal {
            padding: 10px 20px !important;
            background-color: rgba(255, 255, 255, .02) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, .05) !important;
            border-radius: 10px !important;
            display: flex;
            align-items: center;
        }

        .custom-swal .swal2-title {
            font-size: 14px !important;
            margin: 0 !important;
            padding: 0 !important;
            line-height: 1.5 !important;
            flex-grow: 1;
        }

        .custom-swal .swal2-icon {
            color: white !important;
            font-size: 10px !important;
            margin-right: 10px !important;

        }
        @keyframes customZoomOut {
            from {
                transform: scale(1.1);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .custom-aos-zoom {
            animation: customZoomOut 0.3s ease-out;
        }


        @keyframes customZoomIn {
            from {
                transform: scale(1);
                opacity: 1;
            }
            to {
                transform: scale(1.1);
                opacity: 0;
            }
        }

        .custom-aos-zoom-in {
            animation: customZoomIn 0.3s ease-out;
        }

    </style>


</head>
<body class="index-page">
<header th:insert="~{elements/header :: header}"></header>
<section class="customContainer forms" style="margin-top: -30px;">
    <div class="form login" >
        <div class="form-content">


            <div class="text-center">
                <img src="img/logo.png" alt="" width="60px">
            </div>

            <div class="titleText">Войти в профиль</div>


            <form id = "authForm"  style="margin-top: 100px;" th:action="@{/api/login}" method="post">


                <div class="field input-field">
                      <input type="text" name="login" placeholder="Введите логин или e-mail" class="input" required>
                </div>
                 <div class="field input-field">

                    <input type="password" name="password" placeholder="Введите пароль" class="password" required>
                    <i class='bx bx-hide eye-icon'></i>
                </div>
                <br><br/>
                <div class="field button-field" type="sumbit">
                    <button>Войти</button>
                </div>
            </form>
            <div class="form-link">
                <a href="/lostpassword" class="forgot-pass">Забыли пароль?</a>
                <a href="/register" class="link signup-link">Регистрация</a></span>
            </div>
        </div>
    </div>
</section>
</body>

</html>

<script>

    function showNotification(msg, icon) {


        Swal.fire({
            position: 'bottom-end',
            icon: icon,
            title: msg,
            showConfirmButton: false,
            timer: 2000,
            toast: true,
            customClass: {
                popup: 'custom-swal'
            },
            background: '#f8f9fa',

            showClass: {
                popup: 'custom-aos-zoom'
            },
            hideClass: {
                popup: 'custom-aos-zoom-in'
            },
        });
    }
</script>

<script src="js/main.js"></script>
